function fileType(v, m = "") {
  v = String(v || "").toLowerCase(); m = String(m || "").toLowerCase();
  if (m.startsWith("image/") || v.startsWith("data:image") || /\.(png|jpe?g|gif|webp|svg)(\?|#|$)/.test(v)) return "image";
  if (m === "application/pdf" || v.includes(".pdf")) return "pdf";
  if (/^https?:\/\//.test(v)) return "web";
  return "text";
}

function readFile(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function compressImage(file, max = 1200) {
  if (!file.type.startsWith("image/")) return readFile(file);
  if (file.type === "image/svg+xml") return readFile(file); // preserve SVG as-is
  const img = new Image();
  img.src = await readFile(file);
  await img.decode();
  const scale = Math.min(1, max / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * scale);
  c.height = Math.round(img.height * scale);
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#ffffff"; // white fill so transparent PNGs have no black background
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL("image/jpeg", 0.82);
}

function pickImage(target, cid, iid) {
  const input = document.createElement("input");
  input.type = "file"; input.accept = "image/*";
  input.onchange = async () => {
    const file = input.files?.[0]; if (!file) return;
    const data = await compressImage(file);
    if (target === "profile") state.profile.photo = data;
    else getItem(cid, iid).logo = data;
    changed();
  };
  input.click();
}

function toast(m) {
  $("toast").textContent = m;
  $("toast").classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => $("toast").classList.remove("show"), 3200);
}

// ── FORM MODAL ─────────────────────────────────────────────────────────────
let _formResolve = null;

function openFormModal(title, html, onSubmit) {
  $("formModalTitle").textContent = title;
  $("formModalBody").innerHTML = html;
  $("formModal").classList.add("open");
  // wire submit
  const submitBtn = $("formModal").querySelector("[data-submit]");
  if (submitBtn) {

  }

function closeFormModal() {
  $("formModal").classList.remove("open");
  $("formModalBody").innerHTML = "";
}

  return `
    <div class="fGroup">
      <label>${cfg.titleLabel} <span style="color:var(--maroon)">*</span></label>
      <input id="fTitle" type="text" placeholder="${cfg.titleHint}" value="${esc(values.title || "")}">
    </div>
    <div class="fGroup">
      <label>${cfg.metaLabel}</label>
      <input id="fMeta" type="text" placeholder="${cfg.metaHint}" value="${esc(values.meta || "")}">
      <p class="hint">${cfg.metaHint || ""}</p>
    </div>
    <div class="fGroup">
      <label>${cfg.descLabel}</label>
      <textarea id="fDesc" rows="4" placeholder="${cfg.descHint}">${esc(values.description || "")}</textarea>
    </div>

      <button class="btn secondary" type="button" onclick="closeFormModal()">Cancel</button>

// ── add / edit ─────────────────────────────────────────────────────────────
function add(cid) {
  const c = getCat(cid); if (!c) return;
  const cfg = getSectionConfig(cid);
  openMenu = null;
  openFormModal(`Add to: ${c.title}`, buildItemFormHTML(cfg), () => {
    const title = $("fTitle").value.trim();
    if (!title) { toast("Title is required."); return false; }
    const meta = $("fMeta").value.trim();
    const description = $("fDesc").value.trim();
    c.items.push({ id: uid(), title, meta, description, logo: logoSvg(title.slice(0, 3).toUpperCase()), attachments: [] });
    changed();
    return true;
  });
}

function edit(cid, iid) {
  const i = getItem(cid, iid); if (!i) return;
  const cfg = getSectionConfig(cid);
  openMenu = null;
  openFormModal(`Edit: ${i.title}`, buildItemFormHTML(cfg, i), () => {
    const title = $("fTitle").value.trim();
    if (!title) { toast("Title is required."); return false; }
    i.title = title;
    i.meta = $("fMeta").value.trim();
    i.description = $("fDesc").value.trim();
    changed();
    return true;
  });
}

// ── addFile ────────────────────────────────────────────────────────────────
function addFile(cid, iid) {
  const i = getItem(cid, iid); if (!i) return;
  openMenu = null;
  let selectedFile = null;

  const html = `
    <div class="fGroup">
      <label>Attachment Title <span style="color:var(--maroon)">*</span></label>
      <input id="fAttTitle" type="text" placeholder="e.g. LPT License Certificate, Seminar Certificate, Thesis PDF">
    </div>
    <div class="fGroup">
      <label>Short Overview / Description</label>
      <input id="fAttOverview" type="text" placeholder="e.g. Official PRC license certificate, March 2026" value="Document preview attached.">
      <p class="hint">Shown as italic subtitle under the attachment button.</p>
    </div>
    <div class="fGroup">
      <label>File <span style="color:var(--maroon)">*</span></label>
      <div class="fileZone" id="fZone" onclick="document.getElementById('fFileInput').click()">
        <div style="font-size:28px">📎</div>
        <p>Click to select a file</p>
        <p>Supports: Images, PDF, TXT, DOC, DOCX</p>
        <p class="fzName" id="fZoneName"></p>
      </div>
      <input id="fFileInput" type="file" accept="image/*,application/pdf,.txt,.doc,.docx" style="display:none">
    </div>
    <div class="fRow">
      <button class="btn secondary" type="button" onclick="closeFormModal()">Cancel</button>
      <button class="btn" type="button" data-submit>Attach File</button>
    </div>`;

  openFormModal(`Add Attachment to: ${i.title}`, html, () => {
    // onSubmit — collect values
    return false; // handled below via custom logic
  });

  // Wire file input after DOM is rendered
  const fileInput = $("fFileInput");
  fileInput.onchange = () => {
    selectedFile = fileInput.files?.[0];
    if (selectedFile) $("fZoneName").textContent = `✓ ${selectedFile.name}`;
  };

  // Override submit button with async handler
  $("formModal").querySelector("[data-submit]").onclick = async () => {
    const title = $("fAttTitle").value.trim();
    if (!title) { toast("Attachment title is required."); return; }
    if (!selectedFile) { toast("Please select a file."); return; }
    const overview = $("fAttOverview").value.trim() || "Document preview attached.";
    const data = selectedFile.type.startsWith("image/")
      ? await compressImage(selectedFile, 1600)
      : await readFile(selectedFile);
    i.attachments = i.attachments || [];
    i.attachments.push({
      id: uid(), title, overview,
      url: data, fileName: selectedFile.name,
      mime: selectedFile.type, type: fileType(selectedFile.name, selectedFile.type)
    });
    closeFormModal();
    changed();
  };
}

// ── del ────────────────────────────────────────────────────────────────────
function del(cid, iid) {
  const c = getCat(cid); if (!c) return;
  if (!confirm("Delete this item? This cannot be undone.")) return;
  c.items = c.items.filter(i => i.id !== iid);
  openMenu = null; changed();
}

// ── view attachment ────────────────────────────────────────────────────────
function viewAttachment(cid, iid, fid) {
  const f = getItem(cid, iid)?.attachments?.find(a => a.id === fid);
  if (!f) return;
  $("viewModalTitle").textContent = f.title;
  const t = f.type || fileType(f.url, f.mime);
  $("viewModalBody").innerHTML = t === "image"
    ? `<img class="previewImg" src="${esc(f.url)}" alt="${esc(f.title)}">`
    : t === "pdf" || t === "web"
    ? `<iframe class="frame" src="${esc(f.url)}" title="${esc(f.title)}"></iframe>`
    : `<div class="textPreview">${esc(f.fileName || f.url)}</div>`;
  $("viewModal").classList.add("open");
}

// ── CLIENT-SIDE BLOB EXTRACTION ───────────────────────────────────────────
// Pulls all base64 data URLs out of state before the main POST, so each
// individual request stays well under Netlify's 6 MB function limit.
function extractStateBlobs(stateObj) {
  const blobs = new Map();
  const lean = JSON.parse(JSON.stringify(stateObj));

  function isBlob(v) { return typeof v === "string" && v.startsWith("data:"); }

  if (isBlob(lean.profile?.photo)) {
    const k = "photo__profile";
    blobs.set(k, lean.profile.photo);
    lean.profile.photo = "__blob:" + k;
  }
  for (const cat of lean.categories || []) {
    for (const item of cat.items || []) {
      if (isBlob(item.logo)) {
        const k = `logo__${cat.id}__${item.id}`;
        blobs.set(k, item.logo);
        item.logo = "__blob:" + k;
      }
      for (const att of item.attachments || []) {
        if (isBlob(att.url)) {
          const k = `att__${cat.id}__${item.id}__${att.id}`;
          blobs.set(k, att.url);
          att.url = "__blob:" + k;
        }
      }
    }
  }
  return { lean, blobs };
}

// ── SAVE LIVE — uploads blobs individually then sends lean state JSON ──────
async function saveLive() {
  try {
    $("saveBtn").disabled = true;
    $("saveBtn").textContent = "Saving…";

    // 1. Strip all base64 blobs from state before any network call
    const { lean, blobs } = extractStateBlobs(state);

    // 2. Upload each blob individually (each is well under 6 MB)
    let idx = 0;
    for (const [k, v] of blobs.entries()) {
      idx++;
      $("saveBtn").textContent = `Uploading ${idx}/${blobs.size}…`;
      const br = await fetch(BLOB_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ownerKey, key: k, data: v })
      });
      if (!br.ok) {
        const bd = await br.json().catch(() => ({}));
        throw new Error(bd.error || "Blob upload failed.");
      }
    }

    // 3. Send the tiny lean state JSON (no base64 inside)
    $("saveBtn").textContent = "Saving state…";
    const r = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ownerKey, state: lean })
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || "Save failed.");
    saved = structuredClone(state);
    dirty = false;
    $("sync").textContent = "Live saved version updated.";
    render();
    toast("Saved! Changes will appear on all devices.");
  } catch (e) {
    toast("Save failed: " + (e.message || "Network error. Check Netlify deployment."));
  } finally {
    $("saveBtn").disabled = false;
    $("saveBtn").textContent = "Save Live";
  }
}

// ── load shared ────────────────────────────────────────────────────────────
async function loadShared() {
  try {
    const r = await fetch(API, { cache: "no-store" });
    if (!r.ok) throw new Error("No shared save endpoint");
    const data = await r.json();
    if (data.state) {
      saved = data.state;
      state = structuredClone(data.state);
      $("sync").textContent = "Live saved version loaded.";
    } else {
      $("sync").textContent = "No live edits saved yet.";
    }
    render();
  } catch (e) {
    $("sync").textContent = "Live saving needs Netlify deployment.";
    toast("Open from the deployed Netlify site to use live saving.");
    render();
  }
}

// ── event delegation ────────────────────────────────────────────────────────
document.addEventListener("click", e => {
  const t = e.target;

  const s = t.closest("[data-scroll]")?.dataset.scroll;
  if (s) {
    document.getElementById(s)?.scrollIntoView({ behavior: "smooth" });
    document.querySelectorAll(".cat").forEach(b => b.classList.toggle("active", b.dataset.scroll === s));
    return;
  }
  const m = t.closest("[data-menu]")?.dataset.menu;
  if (m) { openMenu = openMenu === m ? null : m; render(); return; }
  if (t.closest("[data-add]")) return add(t.closest("[data-add]").dataset.add);
  if (t.closest("[data-edit]")) return edit(...t.closest("[data-edit]").dataset.edit.split(":"));
  if (t.closest("[data-delete]")) return del(...t.closest("[data-delete]").dataset.delete.split(":"));
  if (t.closest("[data-file]")) return addFile(...t.closest("[data-file]").dataset.file.split(":"));
  if (t.closest("[data-upload]")) return pickImage("logo", ...t.closest("[data-upload]").dataset.upload.split(":"));
  if (t.closest("[data-view]")) return viewAttachment(...t.closest("[data-view]").dataset.view.split(":"));

  // close dropdown when clicking outside
  if (openMenu && !t.closest(".drop") && !t.closest(".kebab")) { openMenu = null; render(); }
});

// ── wires ──────────────────────────────────────────────────────────────────
$("profileUpload").onclick = () => pickImage("profile");

$("ownerBtn").onclick = () => {
  if (owner) { owner = false; ownerKey = ""; openMenu = null; render(); return; }
  const k = prompt("Enter owner key:");
  if (k === OWNER_CODE) { owner = true; ownerKey = k; toast("Owner Mode unlocked."); render(); }
  else if (k !== null) toast("Owner key did not match.");
};

$("saveBtn").onclick = saveLive;
$("discardBtn").onclick = () => {
  if (!confirm("Discard unsaved changes?")) return;
  state = structuredClone(saved); dirty = false; openMenu = null; render();
};

// view modal close
$("viewClose").onclick = () => { $("viewModal").classList.remove("open"); $("viewModalBody").innerHTML = ""; };
$("viewModal").onclick = e => { if (e.target === $("viewModal")) $("viewClose").click(); };

// form modal close
$("formClose").onclick = closeFormModal;
$("formModal").onclick = e => { if (e.target === $("formModal")) closeFormModal(); };

addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if ($("viewModal").classList.contains("open")) $("viewClose").click();
    else if ($("formModal").classList.contains("open")) closeFormModal();
  }
});

addEventListener("beforeunload", e => { if (dirty) { e.preventDefault(); e.returnValue = ""; } });

render();
loadShared();
</script>
